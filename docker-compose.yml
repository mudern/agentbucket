version: '3.8'

services:
  agentbucket:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '8080:8080'
    volumes:
      - agentbucket-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AGENTBUCKET_ADDR=0.0.0.0:8080
      - AGENTBUCKET_DATA_DIR=/data
      - AGENTBUCKET_SIDECAR_HOST=host.docker.internal
      - AGENTBUCKET_BUILD_TIMEOUT=300s
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  agentbucket-data:
